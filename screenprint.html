<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Screenprinting Project</title>

    <style>
        body {
            background: #f4f6f8;
            text-align: center;
            margin: 0;
            padding: 40px;
            color: #222;
        }

        h1 {
            font-size: 50px;
            font-weight: bold;
        }

        img {
            width: 300px;
            margin: 10px;
            border-radius: 10px;
        }

        video {
            width: 400px;
            margin-top: 20px;
            border-radius: 10px;
        }

        p {
            max-width: 700px;
            margin: 15px auto;
            line-height: 1.6;
        }

        a {
            display: inline-block;
            margin-top: 20px;
            text-decoration: none;
            background: #2f6fed;
            color: white;
            padding: 10px 15px;
            border-radius: 6px;
        }

        a:hover {
            background: #1f4fbf;
        }
    </style>
</head>

<body>

    <h1>Screenprinting Project</h1>

</body>

</html>
